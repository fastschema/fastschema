version: '3.7'

services:
  mysql8:
    platform: linux/amd64
    image: mysql:8
    environment:
      MYSQL_DATABASE: fastschema
      MYSQL_ROOT_PASSWORD: 123
    healthcheck:
      test: mysqladmin ping -p123
    ports:
      - 3307:3306
  mysql9:
    platform: linux/amd64
    image: mysql:9
    environment:
      MYSQL_DATABASE: fastschema
      MYSQL_ROOT_PASSWORD: 123
    healthcheck:
      test: mysqladmin ping -p123
    ports:
      - 3308:3306

  mariadb10:
    platform: linux/amd64
    image: mariadb:10
    environment:
      MYSQL_DATABASE: fastschema
      MYSQL_ROOT_PASSWORD: 123
    healthcheck:
      test: mysqladmin ping -p123
    ports:
      - 3309:3306

  mariadb11:
    platform: linux/amd64
    image: mariadb:11
    environment:
      MYSQL_DATABASE: fastschema
      MYSQL_ROOT_PASSWORD: 123
    healthcheck:
      test:
        [
          'CMD',
          'mariadb-admin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-p123',
          '--silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 3310:3306

  mariadb12:
    platform: linux/amd64
    image: mariadb:12
    environment:
      MYSQL_DATABASE: fastschema
      MYSQL_ROOT_PASSWORD: 123
    healthcheck:
      test:
        [
          'CMD',
          'mariadb-admin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-p123',
          '--silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 3311:3306

  postgres10:
    platform: linux/amd64
    image: postgres:10
    environment:
      POSTGRES_DB: fastschema
      POSTGRES_PASSWORD: 123
    healthcheck:
      test: pg_isready -U postgres
    ports:
      - 5433:5432

  postgres11:
    platform: linux/amd64
    image: postgres:11
    environment:
      POSTGRES_DB: fastschema
      POSTGRES_PASSWORD: 123
    healthcheck:
      test: pg_isready -U postgres
    ports:
      - 5434:5432

  postgres12:
    platform: linux/amd64
    image: postgres:12
    environment:
      POSTGRES_DB: fastschema
      POSTGRES_PASSWORD: 123
    healthcheck:
      test: pg_isready -U postgres
    ports:
      - 5435:5432

  postgres13:
    platform: linux/amd64
    image: postgres:13
    environment:
      POSTGRES_DB: fastschema
      POSTGRES_PASSWORD: 123
    healthcheck:
      test: pg_isready -U postgres
    ports:
